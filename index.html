<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💰 200 Cajones - Jefferson & Carolina</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <style>
    .grid-cajones {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 12px;
      margin-top: 20px;
    }
    .cajon {
      background: #1e1e2e;
      border: 2px solid #3f3f4f;
      border-radius: 12px;
      padding: 12px 6px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cajon:hover {
      transform: translateY(-2px);
      border-color: #10b981;
    }
    .cajon.checked {
      background: linear-gradient(145deg, #10b981, #059669);
      border-color: #34d399;
      color: white;
    }
    .cajon.checked .monto {
      color: white;
    }
    .cajon input {
      width: 18px;
      height: 18px;
      margin-top: 8px;
      cursor: pointer;
      accent-color: #10b981;
    }
    @media (max-width: 768px) {
      .grid-cajones { gap: 6px; }
      .cajon { padding: 8px 3px; }
      .cajon div { font-size: 11px; }
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-12">

<div class="max-w-7xl mx-auto px-4 pt-8">
  
  <!-- Header -->
  <div class="text-center mb-10">
    <h1 class="text-5xl font-bold">Jefferson <span class="text-emerald-400">&</span> Carolina</h1>
    <p class="text-2xl text-emerald-300 mt-2">🔥 200 Cajones del Sueño 🔥</p>
    <p id="status" class="text-sm text-zinc-500 mt-2">🟢 Conectando...</p>
  </div>

  <!-- Stats -->
  <div class="bg-zinc-900 rounded-2xl p-6 mb-8">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
      <div>
        <p class="text-zinc-400 text-sm">Ahorrado</p>
        <p id="total" class="text-3xl font-bold text-emerald-400">0</p>
      </div>
      <div>
        <p class="text-zinc-400 text-sm">Progreso</p>
        <div class="h-2 bg-zinc-800 rounded-full mt-2">
          <div id="progress-bar" class="h-full bg-emerald-500 rounded-full w-0 transition-all"></div>
        </div>
        <p id="percent" class="text-xl font-bold mt-1">0%</p>
      </div>
      <div>
        <p class="text-zinc-400 text-sm">Cajones</p>
        <p id="count" class="text-3xl font-bold">0/200</p>
      </div>
      <div>
        <p class="text-zinc-400 text-sm">Falta</p>
        <p id="remaining" class="text-2xl font-bold text-orange-400">0</p>
      </div>
    </div>
  </div>

  <!-- Grid de cajones -->
  <div class="bg-zinc-900/50 rounded-2xl p-6">
    <div id="gridContainer" class="grid-cajones"></div>
  </div>

  <!-- Botones -->
  <div class="flex gap-4 justify-center mt-8">
    <button onclick="resetAll()" class="bg-red-800/50 hover:bg-red-700 px-6 py-3 rounded-xl transition-all">
      <i class="fas fa-trash"></i> Reiniciar
    </button>
    <button onclick="exportCSV()" class="bg-emerald-700/50 hover:bg-emerald-600 px-6 py-3 rounded-xl transition-all">
      <i class="fas fa-download"></i> Exportar CSV
    </button>
  </div>
</div>

<script>
  // ========== 🔥 TU CONFIGURACIÓN CORRECTA (con databaseURL agregada) 🔥 ==========
  const firebaseConfig = {
    apiKey: "AIzaSyD8zI7fsuPDpOBZ8BnzIRNhUz69dxM1AMc",
    authDomain: "box-chalenge.firebaseapp.com",
    databaseURL: "https://box-chalenge-default-rtdb.firebaseio.com",  // ← ESTA ES LA LÍNEA QUE FALTABA
    projectId: "box-chalenge",
    storageBucket: "box-chalenge.firebasestorage.app",
    messagingSenderId: "119209832804",
    appId: "1:119209832804:web:6d33f309675b3324b54a71"
  };
  // =============================================================================

  // Inicializar Firebase (UNA SOLA VEZ, sin imports raros)
  let database = null;
  
  try {
    // Inicializar solo si no está ya inicializado
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    database = firebase.database();
    console.log('✅ Firebase conectado correctamente');
    document.getElementById('status').innerHTML = '✅ Sincronizado en vivo';
    document.getElementById('status').className = 'text-emerald-400 text-sm';
  } catch (e) {
    console.error('❌ Error:', e);
    document.getElementById('status').innerHTML = '⚠️ Modo local';
    document.getElementById('status').className = 'text-yellow-400 text-sm';
  }

  let checkedSet = new Set();
  const TOTAL_GOAL = 20100000;

  // Crear los 200 cajones
  function crearCajones() {
    const container = document.getElementById('gridContainer');
    container.innerHTML = '';
    
    for (let i = 1; i <= 200; i++) {
      const monto = i * 1000;
      const div = document.createElement('div');
      div.className = 'cajon';
      
      div.innerHTML = `
        <div class="text-xs text-zinc-400">#${i}</div>
        <div class="monto font-bold text-emerald-400 text-sm">$${monto.toLocaleString('es-CO')}</div>
        <input type="checkbox" class="check-cajon">
      `;
      
      const checkbox = div.querySelector('.check-cajon');
      
      checkbox.addEventListener('click', (e) => {
        e.stopPropagation();
        if (checkbox.checked) {
          checkedSet.add(i);
        } else {
          checkedSet.delete(i);
        }
        guardarYActualizar();
      });
      
      div.addEventListener('click', () => {
        checkbox.checked = !checkbox.checked;
        if (checkbox.checked) {
          checkedSet.add(i);
        } else {
          checkedSet.delete(i);
        }
        guardarYActualizar();
      });
      
      container.appendChild(div);
    }
    console.log('✅ 200 cajones creados');
    actualizarUI();
  }

  function guardarYActualizar() {
    // Guardar en Firebase si está disponible
    if (database) {
      database.ref('cajones200').set(Array.from(checkedSet))
        .then(() => console.log('✅ Guardado en Firebase'))
        .catch(err => console.error('Error guardando:', err));
    }
    // Backup local
    localStorage.setItem('cajones_backup', JSON.stringify(Array.from(checkedSet)));
    actualizarUI();
  }

  function actualizarUI() {
    const total = Array.from(checkedSet).reduce((sum, num) => sum + (num * 1000), 0);
    const percent = (total / TOTAL_GOAL) * 100;
    const count = checkedSet.size;
    
    document.getElementById('total').textContent = total.toLocaleString('es-CO');
    document.getElementById('percent').textContent = Math.round(percent) + '%';
    document.getElementById('count').textContent = `${count}/200`;
    document.getElementById('remaining').textContent = (TOTAL_GOAL - total).toLocaleString('es-CO');
    document.getElementById('progress-bar').style.width = percent + '%';
    
    // Actualizar visual de cada cajón
    document.querySelectorAll('.cajon').forEach((div, idx) => {
      const num = idx + 1;
      if (checkedSet.has(num)) {
        div.classList.add('checked');
        div.querySelector('.check-cajon').checked = true;
      } else {
        div.classList.remove('checked');
        div.querySelector('.check-cajon').checked = false;
      }
    });
  }

  async function cargarDatos() {
    if (!database) {
      // Sin Firebase, cargar desde localStorage
      const local = localStorage.getItem('cajones_backup');
      if (local) {
        checkedSet = new Set(JSON.parse(local));
        actualizarUI();
      }
      return;
    }
    
    try {
      const snapshot = await database.ref('cajones200').once('value');
      const data = snapshot.val();
      if (data && Array.isArray(data)) {
        checkedSet = new Set(data);
      } else {
        const local = localStorage.getItem('cajones_backup');
        if (local) {
          checkedSet = new Set(JSON.parse(local));
          guardarYActualizar(); // subir a Firebase
        }
      }
      actualizarUI();
    } catch (e) {
      console.error('Error cargando:', e);
      const local = localStorage.getItem('cajones_backup');
      if (local) checkedSet = new Set(JSON.parse(local));
      actualizarUI();
    }
  }

  function escucharCambios() {
    if (!database) return;
    database.ref('cajones200').on('value', (snapshot) => {
      const data = snapshot.val();
      if (data && Array.isArray(data)) {
        checkedSet = new Set(data);
        actualizarUI();
      }
    });
  }

  function resetAll() {
    if (confirm('¿Reiniciar todo el progreso? Esta acción afectará ambos dispositivos')) {
      checkedSet.clear();
      guardarYActualizar();
    }
  }

  function exportCSV() {
    let csv = "Cajon,Monto_COP,Cumplido\n";
    for (let i = 1; i <= 200; i++) {
      csv += `${i},${i * 1000},${checkedSet.has(i) ? 'Si' : 'No'}\n`;
    }
    const blob = new Blob(["\uFEFF" + csv], {type: 'text/csv;charset=utf-8'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `ahorro_cajones_${new Date().toISOString().split('T')[0]}.csv`;
    link.click();
  }

  window.resetAll = resetAll;
  window.exportCSV = exportCSV;

  // Iniciar
  crearCajones();
  cargarDatos().then(() => escucharCambios());
</script>
</body>
</html>
